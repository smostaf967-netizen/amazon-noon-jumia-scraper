name: Amazon Related Products - Account 1

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  scrape:
    name: "Related ${{ matrix.slice }}/80"
    runs-on: ubuntu-latest
    timeout-minutes: 350
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { slice: 0 }
          - { slice: 1 }
          - { slice: 2 }
          - { slice: 3 }
          - { slice: 4 }
          - { slice: 5 }
          - { slice: 6 }
          - { slice: 7 }
          - { slice: 8 }
          - { slice: 9 }
          - { slice: 10 }
          - { slice: 11 }
          - { slice: 12 }
          - { slice: 13 }
          - { slice: 14 }
          - { slice: 15 }
          - { slice: 16 }
          - { slice: 17 }
          - { slice: 18 }
          - { slice: 19 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install curl-cffi scrapy
      - name: Download checkpoint
        uses: actions/download-artifact@v4
        with:
          name: related-ckpt-${{ matrix.slice }}
          path: .
        continue-on-error: true
      - name: Download seed ASINs
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ ! -f related_checkpoint_${{ matrix.slice }}.json ] && [ -n "$MASTER_TOKEN" ]; then
            git clone --depth 1 https://$MASTER_TOKEN@github.com/$MASTER_OWNER/scraped-products-master.git _m 2>/dev/null || true
            [ -d _m/data ] && find _m/data -name "*.csv" -exec cp {} . \; && rm -rf _m
          fi
      - name: Scrape
        run: python amazon_related_spider.py --slice ${{ matrix.slice }} --total-slices 80 --limit 99999
        timeout-minutes: 330
      - name: Upload checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: related-ckpt-${{ matrix.slice }}
          path: related_checkpoint_${{ matrix.slice }}.json
          overwrite: true
          if-no-files-found: ignore
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: related-out-${{ matrix.slice }}
          path: related_products_${{ matrix.slice }}.json
          if-no-files-found: ignore

  export:
    name: Merge and Push
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: related-out-*
          merge-multiple: true
      - name: Merge
        run: |
          python -c "
          import json, csv, glob, sys
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          products, seen = [], set()
          for f in sorted(glob.glob('related_products_*.json')):
              try:
                  data = json.loads(open(f, encoding='utf-8').read())
                  for p in data:
                      a = p.get('asin','')
                      if a and a not in seen:
                          seen.add(a)
                          products.append(p)
              except: pass
          print(f'Total: {len(products)} unique products')
          if not products: sys.exit(0)
          cols = list(products[0].keys())
          with open('amazon_products_related.csv', 'w', encoding='utf-8-sig', newline='') as f:
              w = csv.DictWriter(f, fieldnames=cols, extrasaction='ignore')
              w.writeheader()
              w.writerows(products)
          "
      - name: Push
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ -z "$MASTER_TOKEN" ] || [ ! -f amazon_products_related.csv ]; then exit 0; fi
          git clone https://$MASTER_TOKEN@github.com/$MASTER_OWNER/scraped-products-master.git mr
          mkdir -p mr/data/account1/
          cp amazon_products_related.csv mr/data/account1/amazon_products_related.csv
          cd mr && git config user.name "bot" && git config user.email "bot@noreply.com"
          git add . && git diff --cached --quiet && exit 0
          git commit -m "Related products account1 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep 10; done
