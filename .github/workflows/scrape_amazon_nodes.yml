name: Amazon Node Scraper - Account 1 (25 nodes)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max products per node'
        required: false
        default: '99999'

jobs:
  scrape:
    name: "Node ${{ matrix.node_id }} (${{ matrix.node_name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { node_id: "18018102031", node_name: "node_18018102031" }
          - { node_id: "18017988031", node_name: "node_18017988031" }
          - { node_id: "18021875031", node_name: "Baby & Child Care" }
          - { node_id: "18018165031", node_name: "node_18018165031" }
          - { node_id: "18018045031", node_name: "node_18018045031" }
          - { node_id: "21845410031", node_name: "node_21845410031" }
          - { node_id: "21845335031", node_name: "node_21845335031" }
          - { node_id: "21845180031", node_name: "node_21845180031" }
          - { node_id: "21832873031", node_name: "node_21832873031" }
          - { node_id: "21868933031", node_name: "node_21868933031" }
          - { node_id: "82771437031", node_name: "node_82771437031" }
          - { node_id: "21857887031", node_name: "node_21857887031" }
          - { node_id: "21857925031", node_name: "node_21857925031" }
          - { node_id: "21845418031", node_name: "node_21845418031" }
          - { node_id: "49987991031", node_name: "node_49987991031" }
          - { node_id: "26136083031", node_name: "node_26136083031" }
          - { node_id: "49987947031", node_name: "node_49987947031" }
          - { node_id: "21857955031", node_name: "node_21857955031" }
          - { node_id: "21833210031", node_name: "node_21833210031" }
          - { node_id: "49987963031", node_name: "node_49987963031" }
          - { node_id: "21833213031", node_name: "node_21833213031" }
          - { node_id: "21845202031", node_name: "node_21845202031" }
          - { node_id: "21833212031", node_name: "node_21833212031" }
          - { node_id: "21863792031", node_name: "Appliances" }
          - { node_id: "22624924031", node_name: "Amazon App Download" }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install curl-cffi scrapy
      - name: Stagger start
        run: sleep $((RANDOM % 20 + 5))
      - name: Scrape node ${{ matrix.node_id }}
        run: |
          python amazon_node_spider.py \
            --node_id   ${{ matrix.node_id }} \
            --node_name "${{ matrix.node_name }}" \
            --limit     ${{ github.event.inputs.limit || '99999' }}
        timeout-minutes: 90
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.node_id }}
          path: "node_*.json"
          if-no-files-found: warn

  export:
    name: "Merge & Export CSV"
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
      - name: Merge JSON to CSV
        run: |
          cat > _merge.py << 'PYEOF'
import json, glob, csv, sys
sys.stdout.reconfigure(encoding="utf-8", errors="replace")
merged = []
for fname in sorted(glob.glob("node_*.json")):
    try:
        data = json.loads(open(fname, encoding="utf-8").read())
        merged.extend(data)
        print(f"{fname}: {len(data)} products")
    except: pass
seen = set()
unique = []
for p in merged:
    asin = p.get("asin","")
    if asin and asin not in seen:
        seen.add(asin)
        unique.append(p)
print(f"Total raw: {len(merged)}, Unique: {len(unique)}")
columns = ["platform","asin","title","brand","category","current_price","original_price",
           "discount","rating","reviews_count","prime_eligible","amazon_choice",
           "sponsored","main_image","product_url","scraped_at"]
with open("amazon_products_nodes.csv", "w", encoding="utf-8-sig", newline="") as f:
    writer = csv.DictWriter(f, fieldnames=columns, extrasaction="ignore")
    writer.writeheader()
    writer.writerows(unique)
print(f"Saved: amazon_products_nodes.csv ({len(unique)} products)")
          PYEOF
          python _merge.py
      - name: Upload merged CSV
        uses: actions/upload-artifact@v4
        with:
          name: amazon-products-nodes
          path: amazon_products_nodes.csv
      - name: Push to master repo
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          if [ -z "$MASTER_TOKEN" ]; then echo "No MASTER_REPO_TOKEN"; exit 0; fi
          git clone https://${MASTER_TOKEN}@github.com/${MASTER_OWNER}/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account1/
          cp amazon_products_nodes.csv master_repo/data/account1/amazon_products_nodes.csv
          cd master_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update amazon nodes from account1 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Pushed OK" && break || sleep $((RANDOM % 10 + 5))
          done
