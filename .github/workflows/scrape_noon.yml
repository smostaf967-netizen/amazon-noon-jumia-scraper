name: Noon Scraper - Account 1 (slice 0/4)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max products total
        required: false
        default: '99999'
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    name: Scrape Noon (slice 0)
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install curl-cffi
      - name: Stagger start
        run: sleep $((RANDOM % 30 + 5))
      - name: Scrape Noon categories
        run: |
          python noon_spider.py \
            --slice 0 \
            --total-slices 4 \
            --limit ${{ github.event.inputs.limit || '99999' }}
        timeout-minutes: 280
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noon-products
          path: noon_products_*.json
          if-no-files-found: warn
      - name: Convert to CSV and push
        if: always()
        env:
          MASTER_TOKEN: ${{ secrets.MASTER_REPO_TOKEN }}
          MASTER_OWNER: ${{ secrets.MASTER_REPO_OWNER }}
        run: |
          python -c "
          import json, csv, glob, sys, pathlib
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          products = []
          for f in glob.glob('noon_products_*.json'):
              products.extend(json.loads(pathlib.Path(f).read_text(encoding='utf-8')))
          print(f'Total: {len(products)} products')
          if not products: sys.exit(0)
          cols = list(products[0].keys())
          with open('noon_products.csv', 'w', encoding='utf-8-sig', newline='') as f:
              w = csv.DictWriter(f, fieldnames=cols, extrasaction='ignore')
              w.writeheader()
              w.writerows(products)
          print(f'Saved noon_products.csv')
          "
          if [ -z "$MASTER_TOKEN" ]; then echo "No token"; exit 0; fi
          if [ ! -f noon_products.csv ]; then echo "No CSV"; exit 0; fi
          git clone https://${MASTER_TOKEN}@github.com/${MASTER_OWNER}/scraped-products-master.git master_repo
          mkdir -p master_repo/data/account1/
          cp noon_products.csv master_repo/data/account1/noon_products.csv
          cd master_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update noon from account1 - $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Pushed OK" && break || sleep $((RANDOM % 10 + 5))
          done
